<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page App</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/EliteChampionships/' +
          l.pathname
            .split('/')
            .slice(0, 2 + pathSegmentsToKeep)
            .join('/') +
          '/?redirect=' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(2 + pathSegmentsToKeep)
            .join('/') +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
